# RocketBox booth — CAD workstation (port 0 / first USB cable)
# Run: ./build/apps/wx/data-transfer-demo --port 0 --config booth-port0.conf

display_name=CAD-Workstation
team=CAD
receive_status=ask_first
receive_folder=~/Incoming/CAD

# Optional tuning (safe defaults applied when omitted):
#   transfer_timeout_ms  per-chunk stall timeout; a stream that stalls mid-
#                        transfer fails after this. Default 30000 (30s).
#   usb_inflight_mb      per-process in-flight buffer budget. 0/omitted =
#                        auto-fit the kernel usbfs limit so submits never hit
#                        LIBUSB_ERROR_NO_MEM. Raise after increasing
#                        /sys/module/usbcore/parameters/usbfs_memory_mb for
#                        higher throughput (e.g. usb_inflight_mb=128).
# transfer_timeout_ms=30000
# usb_inflight_mb=0

[peer0]
display_name=Creative-Desk
team=Creative
receive_status=open
port_index=1
