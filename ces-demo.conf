# RocketBox Transfer — unified booth config (both instances can share this file)
# Prefer per-instance configs for clarity:
#   booth-port0.conf  →  --port 0  (CAD, ask-first)
#   booth-port1.conf  →  --port 1  (Creative, auto-accept)
#
# Instance A: ./build/apps/wx/data-transfer-demo --port 0 --config booth-port0.conf
# Instance B: ./build/apps/wx/data-transfer-demo --port 1 --config booth-port1.conf
#
# Legacy single file (still works):
#   ./build/apps/wx/data-transfer-demo --port 0 --config ces-demo.conf
#   ./build/apps/wx/data-transfer-demo --port 1 --config ces-demo.conf

display_name=CAD-Workstation
team=CAD
receive_status=ask_first
receive_folder=~/Incoming

[port0]
display_name=CAD-Workstation
team=CAD
receive_status=ask_first
receive_folder=~/Incoming

[port1]
display_name=Creative-Desk
team=Creative
receive_status=open
receive_folder=~/Incoming

[peer0]
display_name=Creative-Desk
team=Creative
receive_status=open
port_index=1

[peer1]
display_name=CAD-Workstation
team=CAD
receive_status=ask_first
port_index=0
