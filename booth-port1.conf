# RocketBox booth — Creative desk (port 1 / second USB cable)
# Run: ./build/apps/wx/data-transfer-demo --port 1 --config booth-port1.conf

display_name=Creative-Desk
team=Creative
receive_status=open
receive_folder=~/Incoming/Creative

# Optional tuning (safe defaults applied when omitted):
#   transfer_timeout_ms  per-chunk stall timeout in ms. Default 30000 (30s).
#   usb_inflight_mb      per-process in-flight buffer budget in MB. 0/omitted =
#                        auto-fit the kernel usbfs limit. Raise after increasing
#                        /sys/module/usbcore/parameters/usbfs_memory_mb.
#   demo_display_mib_s   stage-demo only: UI shows this MiB/s for live, peak,
#                        and average speed instead of measured throughput.
#                        Does not change the real USB transfer. 7168 ≈ 7 GiB/s.
#   demo_display_jitter_pct  ±percent random variation per transfer run on the
#                        display rate above (e.g. 3 => ~6972–7364 MiB/s).
#   accept_ready_gap_ms    pause after offer / between accept and ready (ms).
#   accept_reply_delay_ms  receiver wait before accept (ms; default 2× gap).
#   accept_timeout_sec     sender wait for accept in ask-first mode.
#   ready_timeout_sec      sender wait after accept for ready + payload start.
#   session_header_timeout_ms  listener poll timeout for session messages.
#   payload_header_timeout_ms  wait for payload header after ready.
# transfer_timeout_ms=30000
# usb_inflight_mb=0
demo_display_mib_s=7168
demo_display_jitter_pct=3

