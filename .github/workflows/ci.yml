name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev
      - name: Configure
        run: cmake -S . -B build -DBUILD_WX_GUI=OFF
      - name: Build
        run: cmake --build build -j"$(nproc)"
      - name: Unit tests
        run: ctest --test-dir build -L unit --output-on-failure
      - name: Integration tests
        run: ctest --test-dir build -L integration --output-on-failure

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install
        working-directory: apps/web
        run: npm ci
      - name: Test
        working-directory: apps/web
        run: npm test
      - name: Build
        working-directory: apps/web
        run: npm run build
