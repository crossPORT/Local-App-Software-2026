name: Release

# Desktop installers (Linux/macOS/Windows) and PWA zip — triggered by version tag push.
on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.0.1 or 0.0.1)"
        required: true

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}

jobs:
  package-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libwxgtk3.2-dev dpkg-dev file curl

      - name: Configure
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX"

      - name: Build
        run: cmake --build build --config Release --target rocketbox -j 4

      - name: Install staging tree
        run: cmake --install build --config Release --prefix "${{ runner.temp }}/install"

      - name: CPack (deb)
        working-directory: build
        run: cpack -G DEB -C Release

      - name: Collect packages
        run: |
          mkdir -p "${{ runner.temp }}/out"
          find build -maxdepth 1 -name '*.deb' -exec cp -v {} "${{ runner.temp }}/out/" \;
          chmod +x scripts/build-appimage.sh
          scripts/build-appimage.sh "${{ runner.temp }}/install" "${{ runner.temp }}/out" "${{ env.RELEASE_TAG }}"
          ls -la "${{ runner.temp }}/out/"

      - uses: actions/upload-artifact@v4
        with:
          name: rocketbox-linux
          path: ${{ runner.temp }}/out/
          if-no-files-found: error
          retention-days: 400

  package-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Install dependencies
        run: brew install wxwidgets libusb pkg-config

      - name: Configure
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
          PKG_CONFIG_PATH: /opt/homebrew/opt/libusb/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:/usr/local/opt/libusb/lib/pkgconfig
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" -DwxWidgets_CONFIG=$(brew --prefix)/bin/wx-config

      - name: Build
        run: cmake --build build --config Release --target rocketbox -j 4

      - name: Install and bundle dylibs
        run: cmake --install build --config Release --prefix "${{ runner.temp }}/install"

      - name: Verify macOS bundle
        run: |
          chmod +x scripts/verify-macos-bundle.sh
          scripts/verify-macos-bundle.sh "${{ runner.temp }}/install/RocketBox.app"
          ls -la "${{ runner.temp }}/install/RocketBox.app/Contents/Frameworks" || true

      - name: Create DMG
        run: |
          chmod +x scripts/build-dmg.sh
          mkdir -p "${{ runner.temp }}/out"
          scripts/build-dmg.sh "${{ runner.temp }}/install" "${{ runner.temp }}/out" "${{ env.RELEASE_TAG }}"
          ls -la "${{ runner.temp }}/out/"

      - uses: actions/upload-artifact@v4
        with:
          name: rocketbox-macos
          path: ${{ runner.temp }}/out/
          if-no-files-found: error
          retention-days: 400

  package-windows:
    runs-on: windows-2022
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/cache@v4
        with:
          path: |
            vcpkg
            build/vcpkg_installed
          key: vcpkg-${{ hashFiles('vcpkg.json') }}-windows-2022
          restore-keys: vcpkg-${{ hashFiles('vcpkg.json') }}-windows-2022

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

      - name: Install vcpkg dependencies
        run: |
          if (-not (Test-Path vcpkg\vcpkg.exe)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
            .\vcpkg\bootstrap-vcpkg.bat
          }
          .\vcpkg\vcpkg install --triplet x64-windows

      - name: Configure
        shell: pwsh
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:INSTALL_PREFIX" `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --target rocketbox -j 4

      - name: Install staging tree
        run: cmake --install build --config Release --prefix "${{ runner.temp }}/install"

      - name: CPack (NSIS)
        working-directory: build
        run: cpack -G NSIS -C Release

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/out"
          find build -maxdepth 1 \( -name '*setup.exe' -o -name '*.exe' \) -exec cp -v {} "${{ runner.temp }}/out/" \;
          ls -la "${{ runner.temp }}/out/"

      - uses: actions/upload-artifact@v4
        with:
          name: rocketbox-windows
          path: ${{ runner.temp }}/out/
          if-no-files-found: error
          retention-days: 400

  package-pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Build and zip PWA
        run: |
          chmod +x scripts/package-pwa.sh
          ./scripts/package-pwa.sh RocketBox-pwa-${{ env.RELEASE_TAG }}.zip
      - uses: actions/upload-artifact@v4
        with:
          name: rocketbox-pwa
          path: RocketBox-pwa-*.zip
          retention-days: 400

  release:
    needs: [package-linux, package-macos, package-windows, package-pwa]
    # Publish a GitHub Release with whatever platforms succeeded — do not wait for all four.
    if: >-
      always() && !cancelled() &&
      (needs.package-linux.result == 'success' ||
       needs.package-macos.result == 'success' ||
       needs.package-windows.result == 'success' ||
       needs.package-pwa.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux artifacts
        if: needs.package-linux.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: rocketbox-linux
          path: dist

      - name: Download macOS artifacts
        if: needs.package-macos.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: rocketbox-macos
          path: dist

      - name: Download Windows artifacts
        if: needs.package-windows.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: rocketbox-windows
          path: dist

      - name: Download PWA artifacts
        if: needs.package-pwa.result == 'success'
        uses: actions/download-artifact@v4
        with:
          name: rocketbox-pwa
          path: dist

      - name: List release files
        run: find dist -type f | sort

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          find dist -type f | sort
          file_count="$(find dist -type f | wc -l)"
          echo "Release file count: $file_count"
          test "$file_count" -ge 1

      - name: Build release body
        id: release_body
        env:
          LINUX: ${{ needs.package-linux.result }}
          MACOS: ${{ needs.package-macos.result }}
          WINDOWS: ${{ needs.package-windows.result }}
          PWA: ${{ needs.package-pwa.result }}
        run: |
          status_line() {
            case "$2" in
              success) echo "- $1: included" ;;
              failure) echo "- $1: **failed** (not attached — download from the workflow run Artifacts tab if another job produced it)" ;;
              skipped) echo "- $1: skipped" ;;
              *) echo "- $1: $2" ;;
            esac
          }
          {
            echo "### Build status"
            status_line "Linux (.deb + AppImage)" "$LINUX"
            status_line "macOS (.dmg)" "$MACOS"
            status_line "Windows (.exe)" "$WINDOWS"
            status_line "PWA (zip)" "$PWA"
            echo
            echo "Successful platform jobs upload artifacts even when other jobs fail. Re-run failed jobs from the Actions tab to add missing installers."
          } >> "$GITHUB_STEP_SUMMARY"
          {
            echo "### Build status"
            status_line "Linux (.deb + AppImage)" "$LINUX"
            status_line "macOS (.dmg)" "$MACOS"
            status_line "Windows (.exe)" "$WINDOWS"
            status_line "PWA (zip)" "$PWA"
          } > release-body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: RocketBox App ${{ env.RELEASE_TAG }}
          body_path: release-body.md
          generate_release_notes: true
          append_body: true
          fail_on_unmatched_files: false
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/RocketBox-pwa-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
