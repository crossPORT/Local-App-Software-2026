name: Release

# Desktop installers (Linux/macOS/Windows) and PWA zip — tag pushes only.
# Artifacts are attached to the GitHub Release for the tag (permanent until deleted).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package-wx:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: linux
            cpack_gen: DEB
          - os: macos-latest
            artifact: macos
            cpack_gen: DragNDrop
          - os: windows-latest
            artifact: windows
            cpack_gen: NSIS
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install vcpkg (Windows)
        if: runner.os == 'Windows'
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
          ./vcpkg/bootstrap-vcpkg.bat
          ./vcpkg/vcpkg install

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libwxgtk3.2-dev dpkg-dev file curl

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install wxwidgets libusb pkg-config

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:INSTALL_PREFIX" `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Configure (Linux)
        if: runner.os == 'Linux'
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX"

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
          PKG_CONFIG_PATH: /opt/homebrew/opt/libusb/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:/usr/local/opt/libusb/lib/pkgconfig
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" -DwxWidgets_CONFIG=$(brew --prefix)/bin/wx-config

      - name: Build
        run: cmake --build build --config Release --target rocketbox -j 4

      - name: Install staging tree
        run: cmake --install build --config Release --prefix "${{ runner.temp }}/install"

      - name: CPack
        working-directory: build
        run: cpack -G "${{ matrix.cpack_gen }}" -C Release

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/out"
          find build -maxdepth 1 \( -name '*.deb' -o -name '*.dmg' -o -name '*setup.exe' -o -name '*.exe' \) \
            -exec cp -v {} "${{ runner.temp }}/out/" \;
          ls -la "${{ runner.temp }}/out/"

      - name: Build AppImage (Linux)
        if: matrix.artifact == 'linux'
        run: |
          chmod +x scripts/build-appimage.sh
          scripts/build-appimage.sh "${{ runner.temp }}/install" "${{ runner.temp }}/out" "${{ github.ref_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocketbox-${{ matrix.artifact }}
          path: ${{ runner.temp }}/out/
          if-no-files-found: error
          retention-days: 400

  package-pwa:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Build and zip PWA
        run: |
          chmod +x scripts/package-pwa.sh
          ./scripts/package-pwa.sh RocketBox-pwa-${{ github.ref_name }}.zip
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rocketbox-pwa
          path: RocketBox-pwa-*.zip
          retention-days: 400

  release:
    needs: [package-wx, package-pwa]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: List release files
        run: find dist -type f | sort

      - name: Verify release artifacts
        run: |
          set -euo pipefail
          find dist -type f | sort
          test "$(find dist -name '*.deb' | wc -l)" -ge 1
          test "$(find dist -name '*.AppImage' | wc -l)" -ge 1
          test "$(find dist -name '*.dmg' | wc -l)" -ge 1
          test "$(find dist -name '*.exe' | wc -l)" -ge 1
          test "$(find dist -name 'RocketBox-pwa-*.zip' | wc -l)" -ge 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RocketBox ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/RocketBox-pwa-*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
