name: Release

# Each platform job is independent. A failure on one OS must never block artifacts
# from the others. Every successful job uploads workflow artifacts AND attaches
# files to the GitHub Release for the tag immediately.
#
# workflow_dispatch: pick a tag and which platforms to build (defaults: all four).
# Tag push: always builds all platforms.
on:
  push:
    tags:
      - "v*"
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to build (e.g. v0.0.1 or 0.0.1)"
        required: true
      build_linux:
        description: "Build Linux (.deb + AppImage)"
        type: boolean
        default: true
      build_macos:
        description: "Build macOS (.dmg)"
        type: boolean
        default: true
      build_windows:
        description: "Build Windows (.exe installer)"
        type: boolean
        default: true
      build_pwa:
        description: "Build PWA (zip)"
        type: boolean
        default: true

permissions:
  contents: write
  packages: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
  VCPKG_FEED_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json

jobs:
  package-linux:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_linux == true || github.event.inputs.build_linux == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libusb-1.0-0-dev libwxgtk3.2-dev dpkg-dev file curl

      - name: Configure
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX"

      - name: Build
        run: cmake --build build --config Release --target rocketbox --parallel

      - name: Install staging tree
        run: cmake --install build --config Release --prefix "${{ runner.temp }}/install"

      - name: CPack (deb)
        working-directory: build
        run: cpack -G DEB -C Release

      - name: Collect packages
        run: |
          mkdir -p "${{ runner.temp }}/out"
          find build -maxdepth 1 -name '*.deb' -exec cp -v {} "${{ runner.temp }}/out/" \;
          chmod +x scripts/build-appimage.sh
          scripts/build-appimage.sh "${{ runner.temp }}/install" "${{ runner.temp }}/out" "${{ env.RELEASE_TAG }}"
          ls -la "${{ runner.temp }}/out/"

      - uses: actions/upload-artifact@v4
        with:
          name: rocketbox-linux
          path: ${{ runner.temp }}/out/
          if-no-files-found: error
          retention-days: 400

      - name: Publish Linux to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: RocketBox App ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: |
            ${{ runner.temp }}/out/**

  package-macos:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_macos == true || github.event.inputs.build_macos == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - name: Install dependencies
        run: brew install wxwidgets libusb pkg-config

      - name: Configure
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
          PKG_CONFIG_PATH: /opt/homebrew/opt/libusb/lib/pkgconfig:/opt/homebrew/lib/pkgconfig:/usr/local/opt/libusb/lib/pkgconfig
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DCMAKE_INSTALL_PREFIX="$INSTALL_PREFIX" -DwxWidgets_CONFIG=$(brew --prefix)/bin/wx-config

      - name: Build
        run: cmake --build build --config Release --target rocketbox --parallel

      - name: Install and bundle dylibs
        run: cmake --install build --config Release --prefix "${{ runner.temp }}/install"

      - name: Verify macOS bundle
        run: |
          chmod +x scripts/verify-macos-bundle.sh
          scripts/verify-macos-bundle.sh "${{ runner.temp }}/install/RocketBox.app"
          ls -la "${{ runner.temp }}/install/RocketBox.app/Contents/Frameworks" || true

      - name: Create DMG
        run: |
          chmod +x scripts/build-dmg.sh
          mkdir -p "${{ runner.temp }}/out"
          scripts/build-dmg.sh "${{ runner.temp }}/install" "${{ runner.temp }}/out" "${{ env.RELEASE_TAG }}"
          ls -la "${{ runner.temp }}/out/"

      - uses: actions/upload-artifact@v4
        with:
          name: rocketbox-macos
          path: ${{ runner.temp }}/out/
          if-no-files-found: error
          retention-days: 400

      - name: Publish macOS to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: RocketBox App ${{ env.RELEASE_TAG }}
          append_body: true
          body: |
            ### Build status
            - Linux (.deb + AppImage): see parallel CI job
            - macOS (.dmg): **included**
          fail_on_unmatched_files: false
          files: |
            ${{ runner.temp }}/out/**

  package-windows:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_windows == true || github.event.inputs.build_windows == 'true'
    runs-on: windows-2022
    timeout-minutes: 120
    # Windows is best-effort. It must never fail the workflow or block other platforms.
    continue-on-error: true
    env:
      VCPKG_BINARY_SOURCES: "clear;nuget,${{ env.VCPKG_FEED_URL }},readwrite"
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}

      - uses: actions/cache@v4
        with:
          path: |
            vcpkg
            vcpkg/downloads
            build/vcpkg_installed
          key: vcpkg-${{ hashFiles('vcpkg.json') }}-windows-2022
          restore-keys: vcpkg-${{ hashFiles('vcpkg.json') }}-windows-2022

      - name: Install NSIS
        run: choco install nsis -y --no-progress

      - name: Add NSIS to PATH
        shell: pwsh
        run: Add-Content -Path $env:GITHUB_PATH -Value "C:\Program Files (x86)\NSIS"

      - name: Install vcpkg dependencies
        shell: pwsh
        env:
          FEED_URL: ${{ env.VCPKG_FEED_URL }}
        run: |
          if (-not (Test-Path vcpkg\vcpkg.exe)) {
            git clone --depth 1 https://github.com/microsoft/vcpkg.git vcpkg
            .\vcpkg\bootstrap-vcpkg.bat
          }

          $nuget = & .\vcpkg\vcpkg.exe fetch nuget | Select-Object -Last 1
          & $nuget sources add `
            -Source $env:FEED_URL `
            -Name GitHubPackages `
            -Username "${{ github.repository_owner }}" `
            -Password "${{ secrets.GITHUB_TOKEN }}" `
            -StorePasswordInClearText
          & $nuget setapikey "${{ secrets.GITHUB_TOKEN }}" `
            -Source $env:FEED_URL

          .\vcpkg\vcpkg install --triplet x64-windows

      - name: Configure
        shell: pwsh
        env:
          INSTALL_PREFIX: ${{ runner.temp }}/install
        run: |
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:INSTALL_PREFIX" `
            -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release --target rocketbox --parallel

      - name: Install and bundle DLLs
        run: cmake --install build --config Release --prefix "${{ runner.temp }}/install"

      - name: Verify Windows install
        shell: pwsh
        run: |
          ./scripts/verify-windows-install.ps1 -InstallPrefix "${{ runner.temp }}/install"
          $dllCount = (Get-ChildItem "${{ runner.temp }}/install/bin" -Filter "*.dll").Count
          if ($dllCount -lt 3) {
            Write-Error "Expected multiple bundled DLLs in install/bin, found $dllCount"
          }
          Get-ChildItem "${{ runner.temp }}/install/bin" | Format-Table Name, Length

      - name: CPack (NSIS)
        working-directory: build
        run: cpack -G NSIS -C Release

      - name: Collect packages
        shell: bash
        run: |
          mkdir -p "${{ runner.temp }}/out"
          find build -maxdepth 1 \( -name '*setup.exe' -o -name '*.exe' \) -exec cp -v {} "${{ runner.temp }}/out/" \;
          ls -la "${{ runner.temp }}/out/"

      - uses: actions/upload-artifact@v4
        with:
          name: rocketbox-windows
          path: ${{ runner.temp }}/out/
          if-no-files-found: error
          retention-days: 400

      - name: Publish Windows to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: RocketBox App ${{ env.RELEASE_TAG }}
          append_body: true
          body: |
            ### Build status
            - Windows (.exe): **included**
          fail_on_unmatched_files: false
          files: |
            ${{ runner.temp }}/out/**

  package-pwa:
    if: github.event_name != 'workflow_dispatch' || github.event.inputs.build_pwa == true || github.event.inputs.build_pwa == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', github.event.inputs.tag) || github.ref }}
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Build and zip PWA
        run: |
          chmod +x scripts/package-pwa.sh
          scripts/package-pwa.sh RocketBox-pwa-${{ env.RELEASE_TAG }}.zip
          ls -la "RocketBox-pwa-${{ env.RELEASE_TAG }}.zip"
          unzip -l "RocketBox-pwa-${{ env.RELEASE_TAG }}.zip" | head -15
      - uses: actions/upload-artifact@v4
        with:
          name: rocketbox-pwa
          path: RocketBox-pwa-${{ env.RELEASE_TAG }}.zip
          if-no-files-found: error
          retention-days: 400

      - name: Publish PWA to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: RocketBox App ${{ env.RELEASE_TAG }}
          append_body: true
          body: |
            ### Build status
            - PWA (zip): **included**
          fail_on_unmatched_files: true
          files: RocketBox-pwa-${{ env.RELEASE_TAG }}.zip

  release-summary:
    needs: [package-linux, package-macos, package-windows, package-pwa]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Platform build summary
        env:
          LINUX: ${{ needs.package-linux.result }}
          MACOS: ${{ needs.package-macos.result }}
          WINDOWS: ${{ needs.package-windows.result }}
          PWA: ${{ needs.package-pwa.result }}
        run: |
          status_line() {
            case "$2" in
              success) echo "- $1: included on GitHub Release + workflow Artifacts" ;;
              failure) echo "- $1: **failed** (other platforms unaffected)" ;;
              skipped) echo "- $1: skipped (not selected or upstream skip)" ;;
              *) echo "- $1: $2" ;;
            esac
          }
          {
            echo "## Release platform summary (${{ env.RELEASE_TAG }})"
            status_line "Linux (.deb + AppImage)" "$LINUX"
            status_line "macOS (.dmg)" "$MACOS"
            status_line "Windows (.exe)" "$WINDOWS"
            status_line "PWA (zip)" "$PWA"
            echo
            echo "Each platform publishes independently. Use workflow_dispatch to build one platform, or re-run only a failed job."
            echo "Windows vcpkg deps are cached in GitHub Packages (NuGet) after the first successful build."
          } >> "$GITHUB_STEP_SUMMARY"
